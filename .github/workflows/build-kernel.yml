###############################################################################
# OnePlus Ace 6T (SM8845) 内核编译 - GitHub Actions Workflow
#
# 使用方法:
#   1. 在 GitHub 创建一个新仓库 (public 或 private 均可)
#   2. 将本目录所有内容上传到仓库根目录:
#        .github/workflows/build-kernel.yml  (本文件)
#        scripts/sync_source.py              (源码同步脚本)
#        scripts/build_kernel.sh             (编译脚本)
#        scripts/extract_artifacts.sh        (产物提取脚本)
#   3. 进入仓库 Actions 标签页
#   4. 选择 "Build OnePlus Ace 6T Kernel" workflow
#   5. 点击 "Run workflow", 选择参数后运行
#
# 产物:
#   - vmlinux              (未压缩内核镜像, 含完整符号表)
#   - Image                (压缩后可刷入的内核镜像)
#   - kallsyms.txt         (从 vmlinux 提取的符号表)
#   - kernel_headers.tar.gz(内核头文件)
#   - build_info.txt       (构建信息)
#
# 预计耗时: 60-120 分钟 (取决于 GitHub runner 负载)
# 磁占用峰值: ~60 GB (GitHub runner 14GB 可用, 已做磁盘清理)
###############################################################################

name: Build OnePlus Ace 6T Kernel

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: '构建变体 (consolidate=调试版含完整符号, perf=正式版)'
        required: true
        type: choice
        options:
          - consolidate
          - perf
        default: consolidate
      extract_vmlinux:
        description: '提取 vmlinux (未压缩内核, ~500MB, 含完整符号表)'
        required: true
        type: boolean
        default: true
      extract_kallsyms:
        description: '从 vmlinux 提取 kallsyms 符号表'
        required: true
        type: boolean
        default: true
      debug_mode:
        description: '调试模式 (输出详细日志, 上传完整 build.log)'
        required: true
        type: boolean
        default: false

# 同一时间只允许一个构建运行, 避免磁盘冲突
concurrency:
  group: build-ace6t-kernel
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      ########################################################################
      # Step 1: 磁盘空间清理
      # GitHub runner 默认只有 ~14GB 可用, 内核编译需要 ~60GB
      # 通过移除预装软件释放空间
      ########################################################################
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Free disk space
        shell: bash
        run: |
          echo "=== 清理前磁盘使用 ==="
          df -h /
          echo ""

          echo "=== 移除预装软件 ==="
          sudo rm -rf /usr/share/dotnet \
                       /usr/local/lib/android \
                       /opt/ghc \
                       /opt/hostedtoolcache/CodeQL \
                       /usr/local/share/chromium \
                       /usr/local/share/powershell \
                       /usr/local/lib/heroku \
                       /usr/local/lib/node_modules \
                       /opt/az \
                       /opt/microsoft/powershell \
                       /opt/hostedtoolcache/go \
                       /opt/hostedtoolcache/PyPy \
                       /opt/hostedtoolcache/node \
                       /usr/local/aws-sam-cli \
                       2>/dev/null || true

          sudo apt-get purge -y firefox google-chrome-stable microsoft-edge-stable \
                              azure-cli dotnet-sdk-* powershell \
                              2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true

          # 清理 Docker 镜像
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi

          echo ""
          echo "=== 清理后磁盘使用 ==="
          df -h /

      ########################################################################
      # Step 2: 安装依赖
      ########################################################################
      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git repo curl wget aria2 pigz python3 python3-pip \
            build-essential bc bison flex libssl-dev libelf-dev \
            cpio lz4 zstd xz-utils unzip rsync \
            llvm clang lld

          # 安装 Python 依赖
          pip3 install --user requests

          # 检查 repo 工具
          echo ""
          echo "=== 工具版本 ==="
          git --version
          python3 --version
          repo --version 2>/dev/null || echo "repo: $(which repo)"
          aria2c --version 2>/dev/null | head -1 || echo "aria2c not found"

      ########################################################################
      # Step 3: 配置 Git
      ########################################################################
      - name: Configure git
        shell: bash
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global color.ui false

      ########################################################################
      # Step 4: 同步内核源码
      # 使用自定义 Python 脚本, 绕过 manifest 中失效的 CodeLinaro 项目
      ########################################################################
      - name: Sync kernel source
shell: bash
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
run: |
  mkdir -p kernel_workspace
  cd kernel_workspace

  # 1. 修正清单仓库地址 (请确认这是正确的仓库地址)
  MANIFEST_REPO="https://github.com/OnePlusOSS/kernel_manifest.git"
  # 2. 修正分支名 (根据你之前的URL推断是 'oneplus')
  MANIFEST_BRANCH="oneplus"
  # 3. 修正清单文件名
  MANIFEST_FILE="sm8845/oneplus_ace_6t.xml"

  # 4. 正确处理布尔值参数
  DEBUG_FLAG=""
  if [ "${{ inputs.debug_mode }}" == "true" ]; then
    DEBUG_FLAG="--debug"
  fi

  # 5. 执行同步命令
  python3 ${{ github.workspace }}/scripts/sync_source.py \
    --manifest-url "$MANIFEST_REPO" \
    --manifest-branch "$MANIFEST_BRANCH" \
    --manifest-name "$MANIFEST_FILE" \
    --output-dir . \
    $DEBUG_FLAG

  echo ""
  echo "=== 同步后磁盘使用 ==="
  df -h /
  echo ""
  echo "=== 源码目录结构 ==="
  ls -la
  echo ""
  ls -la kernel_platform/ 2>/dev/null || echo "kernel_platform 不存在!"


      ########################################################################
      # Step 5: 编译内核
      ########################################################################
      - name: Build kernel
        id: build
        shell: bash
        run: |
          cd kernel_workspace
          bash ${{ github.workspace }}/scripts/build_kernel.sh \
            --platform sun \
            --variant ${{ inputs.build_variant }} \
            --debug ${{ inputs.debug_mode }}

      ########################################################################
      # Step 6: 提取产物 (vmlinux, kallsyms, Image, headers)
      ########################################################################
      - name: Extract artifacts
        shell: bash
        run: |
          cd kernel_workspace
          bash ${{ github.workspace }}/scripts/extract_artifacts.sh \
            --output-dir ${{ github.workspace }}/artifacts \
            --extract-vmlinux ${{ inputs.extract_vmlinux }} \
            --extract-kallsyms ${{ inputs.extract_kallsyms }} \
            --debug ${{ inputs.debug_mode }}

      ########################################################################
      # Step 7: 生成构建信息文件
      ########################################################################
      - name: Generate build info
        shell: bash
        run: |
          cd ${{ github.workspace }}/artifacts
          cat > build_info.txt << EOF
          ============================================
          OnePlus Ace 6T (SM8845) Kernel Build Info
          ============================================
          Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Build Runner: $(hostname)
          Build Variant: ${{ inputs.build_variant }}
          GitHub Run ID: ${{ github.run_id }}
          GitHub Run Number: ${{ github.run_number }}
          GitHub Commit: ${{ github.sha }}
          GitHub Branch: ${{ github.ref_name }}

          Kernel Source:
            - Manifest: OnePlusOSS/kernel_manifest @ oneplus/sm8845
            - Kernel: OnePlusOSS/android_kernel_oneplus_sm8845 @ oneplus/sm8845_b_16.0.0_ace_6t
            - Modules: OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8845
            - Common: OnePlusOSS/android_kernel_common_oneplus_sm8845

          Target Device:
            - Device: OnePlus Ace 6T
            - Chipset: Qualcomm SM8845 (Snapdragon 8 Gen 5)
            - Android: 16
            - Kernel: 6.12.38-android16-5
            - Platform codename: sun

          Build Artifacts:
          EOF

          ls -lh >> build_info.txt
          echo "" >> build_info.txt
          echo "============================================" >> build_info.txt

          cat build_info.txt

      ########################################################################
      # Step 8: 上传产物
      ########################################################################
      - name: Upload vmlinux artifact
        if: ${{ inputs.extract_vmlinux }}
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-ace6t-${{ inputs.build_variant }}
          path: artifacts/vmlinux
          retention-days: 30
          compression-level: 0  # vmlinux 已不可压缩, 0 节省时间

      - name: Upload kallsyms artifact
        if: ${{ inputs.extract_kallsyms }}
        uses: actions/upload-artifact@v4
        with:
          name: kallsyms-ace6t-${{ inputs.build_variant }}
          path: artifacts/kallsyms.txt
          retention-days: 90

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image-ace6t-${{ inputs.build_variant }}
          path: artifacts/Image
          retention-days: 30
          compression-level: 0

      - name: Upload kernel modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules-ace6t-${{ inputs.build_variant }}
          path: artifacts/modules.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build info and logs
        uses: actions/upload-artifact@v4
        with:
          name: build-info-ace6t-${{ inputs.build_variant }}
          path: |
            artifacts/build_info.txt
            artifacts/*.log
          retention-days: 90
          if-no-files-found: warn

      - name: Upload full build log (debug only)
        if: ${{ inputs.debug_mode }}
        uses: actions/upload-artifact@v4
        with:
          name: build-log-ace6t-${{ inputs.build_variant }}
          path: kernel_workspace/build.log
          retention-days: 7
          if-no-files-found: warn

      ########################################################################
      # Step 9: 构建摘要
      ########################################################################
      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "## OnePlus Ace 6T Kernel Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Device | OnePlus Ace 6T (SM8845) |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | 6.12.38-android16-5 |" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | ${{ inputs.build_variant }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Date | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- vmlinux: ${{ inputs.extract_vmlinux && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- kallsyms: ${{ inputs.extract_kallsyms && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Final Disk Usage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          df -h / >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
