name: Build OnePlus Ace6T Kernel (vmlinux + kallsyms)

# ============================================================================
# 一加 Ace6T 内核构建工作流
# 基于 OnePlusOSS 官方开源内核 (SM8750 / Android 16)
# 输出: vmlinux, kallsyms, Image, boot.img 所需的内核镜像
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: "构建配置 (gki_defconfig 为通用 GKI 内核)"
        required: true
        type: choice
        default: "gki_defconfig"
        options:
          - "gki_defconfig"
      upload_vmlinux:
        description: "上传 vmlinux (文件较大 ~500MB)"
        required: true
        type: boolean
        default: true
      upload_kallsyms:
        description: "上传 kallsyms 符号表"
        required: true
        type: boolean
        default: true
      upload_image:
        description: "上传 Image 内核镜像 (可刷入)"
        required: true
        type: boolean
        default: true
      enable_ccache:
        description: "启用 ccache 加速二次构建"
        required: true
        type: boolean
        default: true

env:
  MANIFEST_URL: https://github.com/OnePlusOSS/kernel_manifest.git
  MANIFEST_BRANCH: oneplus/sm8750
  MANIFEST_NAME: oneplus_ace_6.xml
  KERNEL_REPO_PATH: kernel_platform/common
  CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
  CCACHE_NOHASHDIR: "true"
  CCACHE_HARDLINK: "true"
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 8G

jobs:
  build:
    name: Build Kernel & Extract vmlinux/kallsyms
    runs-on: ubuntu-latest
    steps:
      # ----------------------------------------------------------------------
      # 步骤 1: 最大化构建磁盘空间
      # ----------------------------------------------------------------------
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout build scripts
        uses: actions/checkout@v4
        with:
          path: scripts

      # ----------------------------------------------------------------------
      # 步骤 2: 安装依赖
      # ----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libelf-dev ccache build-essential bc bison flex \
            libssl-dev python3 python3-pip lld llvm dwarves zstd
          # 安装 repo 工具
          curl https://storage.googleapis.com/git-repo-downloads/repo > /tmp/repo
          chmod a+x /tmp/repo
          sudo mv /tmp/repo /usr/local/bin/repo
          # git 配置
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      # ----------------------------------------------------------------------
      # 步骤 3: 恢复 ccache (可选加速)
      # ----------------------------------------------------------------------
      - name: Restore ccache
        if: ${{ inputs.enable_ccache }}
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-sm8750-ace6t-${{ github.run_id }}
          restore-keys: |
            ccache-sm8750-ace6t-

      # ----------------------------------------------------------------------
      # 步骤 4: 同步 OnePlus 官方内核源码
      # ----------------------------------------------------------------------
      - name: Sync OnePlus kernel source
        run: |
          echo "=== 开始同步 OnePlus OSS 内核源码 ==="
          echo "Manifest: ${{ env.MANIFEST_URL }} branch=${{ env.MANIFEST_BRANCH }} name=${{ env.MANIFEST_NAME }}"
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u ${{ env.MANIFEST_URL }} \
            -b ${{ env.MANIFEST_BRANCH }} \
            -m ${{ env.MANIFEST_NAME }} \
            --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
          echo "=== 源码同步完成 ==="
          du -sh kernel_platform/*

      # ----------------------------------------------------------------------
      # 步骤 5: 清理 protected exports (避免构建报错)
      # ----------------------------------------------------------------------
      - name: Remove protected exports & clean dirty flag
        run: |
          cd kernel_workspace
          rm -f kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm -f kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true
          # 移除 -dirty 后缀
          for f in kernel_platform/common/scripts/setlocalversion \
                   kernel_platform/msm-kernel/scripts/setlocalversion \
                   kernel_platform/external/dtc/scripts/setlocalversion; do
            if [ -f "$f" ]; then
              sed -i 's/ -dirty//g' "$f"
              sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
            fi
          done

      # ----------------------------------------------------------------------
      # 步骤 6: 编译内核
      # ----------------------------------------------------------------------
      - name: Build kernel
        run: |
          echo "=== 开始编译内核 ==="
          cd kernel_workspace/${{ env.KERNEL_REPO_PATH }}

          # 工具链路径
          export PATH="/usr/lib/ccache:$PWD/../../prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"
          export PATH="/usr/lib/ccache:$PATH"

          # 编译
          make -j$(nproc --all) \
            LLVM=1 \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" \
            RUSTC=../../prebuilts/rust/linux-x86/1.73.0b/bin/rustc \
            PAHOLE=../../prebuilts/kernel-build-tools/linux-x86/bin/pahole \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out \
            KCFLAGS+=-O2 \
            ${{ inputs.build_variant }} all

          echo "=== 编译完成 ==="
          echo "=== 构建产物 ==="
          ls -lh out/arch/arm64/boot/Image 2>/dev/null && echo "✓ Image"
          ls -lh out/arch/arm64/boot/vmlinux 2>/dev/null && echo "✓ vmlinux (boot)"
          ls -lh out/vmlinux 2>/dev/null && echo "✓ vmlinux (root)"

      # ----------------------------------------------------------------------
      # 步骤 7: 提取 vmlinux
      # ----------------------------------------------------------------------
      - name: Extract vmlinux
        run: |
          cd kernel_workspace/${{ env.KERNEL_REPO_PATH }}
          mkdir -p $GITHUB_WORKSPACE/artifacts

          # vmlinux 可能在两个位置
          VMLINUX=""
          for p in out/vmlinux out/arch/arm64/boot/vmlinux; do
            if [ -f "$p" ]; then
              VMLINUX="$p"
              break
            fi
          done

          if [ -z "$VMLINUX" ]; then
            echo "❌ 未找到 vmlinux!"
            exit 1
          fi

          echo "找到 vmlinux: $VMLINUX"
          ls -lh "$VMLINUX"
          file "$VMLINUX"

          # 复制到 artifacts
          cp "$VMLINUX" $GITHUB_WORKSPACE/artifacts/vmlinux
          # 同时保存一个压缩版本 (vmlinux 通常 300-800MB)
          zstd -19 -T0 "$VMLINUX" -o $GITHUB_WORKSPACE/artifacts/vmlinux.zst
          ls -lh $GITHUB_WORKSPACE/artifacts/

      # ----------------------------------------------------------------------
      # 步骤 8: 提取 kallsyms 符号表
      # ----------------------------------------------------------------------
      - name: Extract kallsyms
        run: |
          cd kernel_workspace/${{ env.KERNEL_REPO_PATH }}
          export PATH="$PWD/../../prebuilts/clang/host/linux-x86/clang-r510928/bin:$PATH"

          VMLINUX=""
          for p in out/vmlinux out/arch/arm64/boot/vmlinux; do
            [ -f "$p" ] && VMLINUX="$p" && break
          done

          echo "=== 从 vmlinux 提取 kallsyms ==="
          echo "vmlinux: $VMLINUX"

          # 方法 1: 使用 llvm-nm 提取所有符号 (最完整)
          # 格式: address type name
          llvm-nm -n "$VMLINUX" 2>/dev/null | \
            awk 'NF>=2 {addr=$1; type=$2; name=$3; for(i=4;i<=NF;i++) name=name" "$i; printf "%016x %s %s\n", strtonum("0x"addr), type, name}' \
            > $GITHUB_WORKSPACE/artifacts/kallsyms.txt || true

          # 方法 2: 使用内核自带的 kallsyms 解析 (如果可用)
          # 提取 .kallsyms 内嵌符号表 (用于 /proc/kallsyms)
          if [ -f scripts/extract-vmlinux ]; then
            chmod +x scripts/extract-vmlinux
          fi

          # 方法 3: 使用 readelf 提取符号 + 节区信息
          llvm-readelf -s "$VMLINUX" 2>/dev/null | \
            awk '/[0-9a-f]+.*FUNC|OBJECT|NOTYPE/ && NF>=8 {print}' \
            > $GITHUB_WORKSPACE/artifacts/vmlinux_symbols.txt || true

          # 统计
          echo "=== kallsyms 提取结果 ==="
          echo "kallsyms.txt 行数: $(wc -l < $GITHUB_WORKSPACE/artifacts/kallsyms.txt 2>/dev/null || echo 0)"
          echo "vmlinux_symbols.txt 行数: $(wc -l < $GITHUB_WORKSPACE/artifacts/vmlinux_symbols.txt 2>/dev/null || echo 0)"
          echo ""
          echo "=== kallsyms.txt 前 20 行预览 ==="
          head -20 $GITHUB_WORKSPACE/artifacts/kallsyms.txt 2>/dev/null || echo "无"
          echo ""
          echo "=== kallsyms.txt 后 20 行预览 ==="
          tail -20 $GITHUB_WORKSPACE/artifacts/kallsyms.txt 2>/dev/null || echo "无"

      # ----------------------------------------------------------------------
      # 步骤 9: 复制 Image (可刷入的内核镜像)
      # ----------------------------------------------------------------------
      - name: Copy Image
        if: ${{ inputs.upload_image }}
        run: |
          cd kernel_workspace/${{ env.KERNEL_REPO_PATH }}
          if [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image $GITHUB_WORKSPACE/artifacts/Image
            ls -lh $GITHUB_WORKSPACE/artifacts/Image
          else
            echo "⚠️ Image 未找到"
          fi

      # ----------------------------------------------------------------------
      # 步骤 10: 生成构建信息
      # ----------------------------------------------------------------------
      - name: Generate build info
        run: |
          cd kernel_workspace/${{ env.KERNEL_REPO_PATH }}
          cat > $GITHUB_WORKSPACE/artifacts/build_info.txt << EOF
          ===========================================
          OnePlus Ace6T Kernel Build Info
          ===========================================
          Build Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Builder: GitHub Actions (runner: ubuntu-latest)
          GitHub Run: ${{ github.run_id }}
          Git Commit: ${{ github.sha }}

          Source:
            Manifest: ${{ env.MANIFEST_URL }}
            Branch:   ${{ env.MANIFEST_BRANCH }}
            XML:      ${{ env.MANIFEST_NAME }}
            Revision: oneplus/sm8750_b_16.0.0_ace_6

          Device Target:
            SoC: Qualcomm SM8750 (Snapdragon 8 Elite Gen 5)
            Device: OnePlus Ace 6 / Ace 6T
            Android: 16
            Kernel: 6.12.x

          Build Config:
            Defconfig: ${{ inputs.build_variant }}
            Compiler: clang (LLVM=1)
            ARCH: arm64

          Artifacts:
            - vmlinux: ELF 内核镜像 (含完整符号, 用于调试/逆向)
            - vmlinux.zst: vmlinux 的 zstd 压缩版
            - kallsyms.txt: 内核符号表 (/proc/kallsyms 格式)
            - vmlinux_symbols.txt: readelf 提取的完整符号表
            - Image: 可刷入的内核镜像 (用于 AnyKernel3 等)
          EOF

          # 提取内核版本字符串
          if [ -f out/include/config/kernel.release ]; then
            echo "" >> $GITHUB_WORKSPACE/artifacts/build_info.txt
            echo "Kernel Release: $(cat out/include/config/kernel.release)" >> $GITHUB_WORKSPACE/artifacts/build_info.txt
          fi

          cat $GITHUB_WORKSPACE/artifacts/build_info.txt

      # ----------------------------------------------------------------------
      # 步骤 11: 显示 ccache 统计
      # ----------------------------------------------------------------------
      - name: Show ccache stats
        if: ${{ inputs.enable_ccache }}
        run: ccache -s

      # ----------------------------------------------------------------------
      # 步骤 12: 上传 vmlinux
      # ----------------------------------------------------------------------
      - name: Upload vmlinux
        if: ${{ inputs.upload_vmlinux }}
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: artifacts/vmlinux
          compression-level: 0
          retention-days: 14

      - name: Upload vmlinux (compressed)
        if: ${{ inputs.upload_vmlinux }}
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux-zst
          path: artifacts/vmlinux.zst
          retention-days: 14

      # ----------------------------------------------------------------------
      # 步骤 13: 上传 kallsyms
      # ----------------------------------------------------------------------
      - name: Upload kallsyms
        if: ${{ inputs.upload_kallsyms }}
        uses: actions/upload-artifact@v4
        with:
          name: kallsyms
          path: |
            artifacts/kallsyms.txt
            artifacts/vmlinux_symbols.txt
          retention-days: 30

      # ----------------------------------------------------------------------
      # 步骤 14: 上传 Image
      # ----------------------------------------------------------------------
      - name: Upload Image
        if: ${{ inputs.upload_image }}
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: artifacts/Image
          compression-level: 0
          retention-days: 14

      # ----------------------------------------------------------------------
      # 步骤 15: 上传构建信息
      # ----------------------------------------------------------------------
      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: artifacts/build_info.txt
          retention-days: 30
